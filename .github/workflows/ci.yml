name: Go Tests

# This workflow will trigger on every push to the main branch
# and every time a Pull Request is opened against main.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Unit Tests and Lint
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23" # Match the version in your go.mod
          cache: true # Speeds up subsequent runs by caching dependencies

      # 3. Download Go modules
      - name: Install dependencies
        run: go mod download

      # 4. Install golangci-lint
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0

      # 5. Run the tests with verbose output and race condition checking
      - name: Run tests
        run: go test -v -race ./...

      # 6. Run benchmarks
      - name: Run benchmarks
        run: go test -bench=. ./...

      # 7. Run golangci-lint
      - name: Run golangci-lint
        run: golangci-lint run ./...
